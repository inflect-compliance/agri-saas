# Test-only Postgres instance for local CI.
# Port 5434 avoids collision with dev DB (5433).
# Usage: docker compose -f docker-compose.test.yml up -d
services:
  postgres-test:
    # PostGIS + pgvector (built from deploy/postgres/Dockerfile — same image
    # as the dev stack; mirrors CI's postgis service + enable-pgvector step).
    # Required by two migrations that plain postgres:16-alpine can't satisfy:
    # 20260613090735_ag_feature1_spray_map (`CREATE EXTENSION postgis`, for
    # Parcel.geometry) and 20260619100000_ai_rag_pgvector (`CREATE EXTENSION
    # vector`, for RAG embeddings). Without both, migrate deploy fails and
    # blocks every later migration (P3009).
    build:
      context: .
      dockerfile: deploy/postgres/Dockerfile
    image: agri-saas-postgres:16-3.4-pgvector
    container_name: inflect-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: inflect_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d inflect_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # RAM disk — fast, wiped on stop
    volumes:
      - ./prisma/init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh:ro

  redis-test:
    image: redis:7-alpine
    container_name: inflect-test-redis
    command: redis-server --appendonly no --save ""
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data  # RAM disk — fast, wiped on stop

  clamav-test:
    image: clamav/clamav:1.4
    container_name: inflect-test-clamav
    ports:
      - "3311:3310"
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    tmpfs:
      - /var/lib/clamav  # RAM disk — ephemeral defs for tests
