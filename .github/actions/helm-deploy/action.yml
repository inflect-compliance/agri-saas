# ───────────────────────────────────────────────────────────────
#  Composite action: Helm deploy to EKS
#
#  Extracted from deploy.yml so the staging and production deploy
#  stages share ONE implementation — the helm logic cannot drift
#  between the two environments. deploy.yml calls this once per
#  stage with the environment-specific release / namespace / values.
#
#  The caller MUST `actions/checkout` first — this action reads the
#  Helm chart from the working tree.
# ───────────────────────────────────────────────────────────────
name: "Helm deploy to EKS"
description: >-
  Deploys the inflect Helm chart to an EKS environment via
  helm upgrade --install (--atomic, --wait). Shared by deploy.yml's
  staging and production stages.

inputs:
  environment:
    description: "Target environment — selects values-<environment>.yaml."
    required: true
  release-name:
    description: "Helm release name."
    required: true
  namespace:
    description: "Kubernetes namespace."
    required: true
  image-tag:
    description: "Container image tag to deploy."
    required: true
  image-repository:
    description: "Container image repository (registry/name)."
    required: true
  chart-path:
    description: "Path to the Helm chart."
    required: true
  aws-region:
    description: "AWS region of the EKS cluster."
    required: true
  aws-role:
    description: "IAM role ARN to assume via OIDC."
    required: true
  eks-cluster:
    description: "EKS cluster name."
    required: true
  helm-version:
    description: "Helm CLI version."
    required: true
  helm-timeout:
    description: "helm --timeout value (e.g. 10m)."
    required: true
  helm-history-max:
    description: "helm --history-max value."
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-role }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: gh-deploy-${{ inputs.environment }}-${{ github.run_id }}

    - name: Setup Helm
      uses: azure/setup-helm@v4
      with:
        version: ${{ inputs.helm-version }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Update kubeconfig (EKS)
      shell: bash
      run: |
        if [ -z "${{ inputs.eks-cluster }}" ]; then
          echo "::error::EKS cluster name is not set for the ${{ inputs.environment }} GitHub Environment (secret EKS_CLUSTER_NAME)."
          exit 1
        fi
        aws eks update-kubeconfig --region "${{ inputs.aws-region }}" --name "${{ inputs.eks-cluster }}"
        kubectl version --client --output=yaml
        kubectl config current-context

    - name: Helm lint chart
      shell: bash
      run: helm lint "${{ inputs.chart-path }}"

    - name: Helm dry-run
      shell: bash
      run: |
        helm upgrade --install \
          "${{ inputs.release-name }}" \
          "${{ inputs.chart-path }}" \
          --namespace "${{ inputs.namespace }}" \
          --create-namespace \
          --values "${{ inputs.chart-path }}/values-${{ inputs.environment }}.yaml" \
          --set image.tag="${{ inputs.image-tag }}" \
          --set image.repository="${{ inputs.image-repository }}" \
          --dry-run \
          --debug \
          > "/tmp/helm-dry-run-${{ inputs.environment }}.txt" 2>&1 \
          || (cat "/tmp/helm-dry-run-${{ inputs.environment }}.txt" && exit 1)
        echo "✓ Dry-run succeeded (${{ inputs.environment }})"

    - name: Helm upgrade --install
      shell: bash
      run: |
        set -euo pipefail
        helm upgrade --install \
          "${{ inputs.release-name }}" \
          "${{ inputs.chart-path }}" \
          --namespace "${{ inputs.namespace }}" \
          --create-namespace \
          --values "${{ inputs.chart-path }}/values-${{ inputs.environment }}.yaml" \
          --set image.tag="${{ inputs.image-tag }}" \
          --set image.repository="${{ inputs.image-repository }}" \
          --wait \
          --timeout "${{ inputs.helm-timeout }}" \
          --history-max "${{ inputs.helm-history-max }}" \
          --atomic
        # --atomic: rolls back to the previous revision if the upgrade fails
        # --wait:   blocks until resources reach Ready
        # --history-max: keeps the last N revisions for `helm rollback`

    - name: Rollout summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Helm rollout: ${{ inputs.environment }}"
          echo ""
          echo "**Release:** \`${{ inputs.release-name }}\` in namespace \`${{ inputs.namespace }}\`"
          echo "**Image:** \`${{ inputs.image-repository }}:${{ inputs.image-tag }}\`"
          echo ""
          echo "### Helm history (last 5)"
          echo '```'
          helm history "${{ inputs.release-name }}" --namespace "${{ inputs.namespace }}" --max 5 || echo "(no history available)"
          echo '```'
          echo ""
          echo "### Pods"
          echo '```'
          kubectl --namespace "${{ inputs.namespace }}" get pods \
            -l "app.kubernetes.io/instance=${{ inputs.release-name }}" \
            -o wide || echo "(no pods)"
          echo '```'
          echo ""
          echo "### Rollback (if needed)"
          echo '```bash'
          echo "helm rollback ${{ inputs.release-name }} --namespace ${{ inputs.namespace }}"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
