#
# GHCR publish — fast-path build + push for Watchtower auto-deploy.
#
# Runs on every push to `main` (in parallel with CI). Pushes an
# image tagged `:latest` and `:sha-<short>` to GHCR. The VM's
# Watchtower container polls :latest and rolls the running app.
#
# Separate from the heavier `deploy.yml` pipeline (which gates on
# CI + has staging/production environments) — this one exists purely
# so `git push` → running in prod is ~5 min.
#
name: Publish image to GHCR

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ghcr-publish-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-push:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract image tags
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix=sha-,format=short
                  # Lowercase is required by GHCR — metadata-action handles it
                  # via the default `image` normalisation.
                  flavor: |
                      latest=false

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64
                  # NEXT_PUBLIC_* are inlined into the client bundle at BUILD
                  # time (see Dockerfile). The map's basemap key must be baked
                  # here or the GHCR image Watchtower auto-deploys falls back to
                  # the bare demo basemap — the local VM build passes it via
                  # compose build.args, so a registry image WITHOUT it is a
                  # silent regression. The key is public-by-design
                  # (referrer-restricted in the MapTiler dashboard) → a repo
                  # Variable, not a Secret. Absent var → empty string → graceful
                  # demo-basemap fallback (no build failure).
                  build-args: |
                      NEXT_PUBLIC_MAPTILER_KEY=${{ vars.NEXT_PUBLIC_MAPTILER_KEY }}
                      NEXT_PUBLIC_MAP_BASEMAP_STYLE=${{ vars.NEXT_PUBLIC_MAP_BASEMAP_STYLE || 'hybrid' }}
