# ───────────────────────────────────────────────────────────────
#  CI — Enterprise-grade pipeline
#  Jobs: changes · lint · typecheck · test · coverage · build · e2e
#        load-smoke · security · codeql · docker (+trivy)
#
#  Job graph:
#    changes (path filter) ─┐   (emits `code`; gates the heavy jobs)
#    lint ─────────────┐    │
#    typecheck ────────┤    │
#    test ─────────────┤    │
#    build ────────────┤    │
#      ├──→ e2e ───────┼────┤   e2e/load-smoke/docker also need `changes`
#      ├──→ load-smoke ┤    │
#      └──→ docker ────┤    │   (Trivy scan folded into docker)
#    security ─────────┤    │
#    codeql ───────────┘────┘
#
#  Triggers: PRs + pushes to main + weekly cron.
#
#  Cost controls:
#    • changes: content-only diffs (docs/**, messages/**, **/*.md) SKIP
#      e2e/load-smoke/docker — a skipped required check passes protection.
#    • cancel-in-progress: PRs only (push/schedule runs always finish).
#    • coverage: main-push only. load-smoke: main-push only.
#    • schedule (weekly): scan-refresh only — build + docker/Trivy + codeql;
#      test/e2e/load-smoke/coverage are skipped.
# ───────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly scheduled scan — GitHub's Code Scanning UI expects a
  # periodic refresh of CodeQL + Trivy results on the default branch,
  # independent of PR cadence. Without this the Security tab can
  # complain about stale analyses. Sunday at 06:00 UTC is during
  # off-hours for the team but during weekday-morning for any
  # security-team triage.
  schedule:
    - cron: "0 6 * * 0"

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs only on PRs — a force-push rebase kills the in-flight
  # run instead of stacking a second full one. Keep push (to main) + schedule
  # runs UN-cancellable so a merge always finishes: protects in-flight SARIF
  # uploads, the coverage gate, and any deploy trigger downstream.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write   # dependency-review comments
  security-events: write # CodeQL SARIF upload
  actions: read          # CodeQL analysis

# ── CI runner sizing ──
# Heavy jobs read `runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}`.
# On Team / Enterprise plans, set the `LARGE_RUNNER` repository
# variable (Settings → Variables → Actions) to a configured
# GitHub-hosted larger-runner label (e.g. `ubuntu-4core`,
# `ubuntu-8core`). Unset → workflow falls back to the free 2-vCPU
# `ubuntu-latest`, so this file works on every plan.

env:
  NODE_VERSION: "22"
  SKIP_ENV_VALIDATION: "1"
  # ── Dummy secrets (CI-only — no real credentials) ──
  AUTH_SECRET: ci-auth-secret-that-is-long-enough
  JWT_SECRET: ci-jwt-secret-that-is-long-enough
  NEXTAUTH_SECRET: ci-auth-secret-that-is-long-enough
  NEXTAUTH_URL: http://localhost:3006
  AUTH_URL: http://localhost:3006
  GOOGLE_CLIENT_ID: ci-google-id
  GOOGLE_CLIENT_SECRET: ci-google-secret
  MICROSOFT_CLIENT_ID: ci-ms-id
  MICROSOFT_CLIENT_SECRET: ci-ms-secret
  MICROSOFT_TENANT_ID: ci-ms-tenant
  UPLOAD_DIR: /tmp/ci-uploads
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3006
  FILE_STORAGE_ROOT: /tmp/ci-uploads

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 0: Detect changes — path filter
  #  Emits `code=true` when a change touches anything OTHER than docs,
  #  i18n message catalogs, or markdown. The heavy build-dependent jobs
  #  (e2e, docker/Trivy, load-smoke) gate on it so a content-only PR
  #  (docs/**, messages/**, **/*.md) skips them — a skipped required
  #  check counts as passing under branch protection. lint/typecheck/
  #  test/security still run, so i18n parity + rendered-string tests
  #  keep gating content-only changes.
  # ═══════════════════════════════════════════════════════════════
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # gitignore-style: match everything, then subtract the content-only
          # paths. `code` is true iff at least one NON-content file changed.
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!messages/**'
              - '!**/*.md'

  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Lint — ESLint + Next.js lint rules
  #  Fast, no DB needed. Fails immediately on lint errors.
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run ESLint
        run: npm run lint

      - name: i18n parity + untranslated check
        # Fails on MISSING / ORPHAN / PLACEHOLDER-DRIFT / UNTRANSLATED-COPY
        # between en.json and every locale. Rides the required "Lint" check;
        # the no-new-hardcoded-string ratchet runs in the Jest test job.
        run: node scripts/i18n-diff.mjs --check

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Typecheck — TypeScript strict compilation
  #  Fast, no DB needed. Catches type errors early.
  # ═══════════════════════════════════════════════════════════════
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run tsc --noEmit
        # tsc's peak heap grows with the codebase + the generated Prisma
        # client; the runner's default ~2 GB ceiling started OOMing. Invoke
        # tsc through node with the heap flag applied DIRECTLY to that V8
        # instance (NODE_OPTIONS does not reliably reach the tsc process).
        run: node --max-old-space-size=8192 ./node_modules/typescript/bin/tsc --noEmit

  # ═══════════════════════════════════════════════════════════════
  #  Job 2b: AI evals — NON-BLOCKING quality report (feat/ai-evals-safety)
  #
  #  Runs the offline eval harness (`npm run eval:ai`): deterministic
  #  MCQ/contains scoring + the safety-behaviour cases (real advisor with
  #  stubbed RAG/routing/product-safety). NO AI secrets required — the
  #  LLM-judge stays skipped unless AI_EVAL_LLM_JUDGE=1 + a backend is
  #  configured. `continue-on-error: true` keeps it advisory: it reports
  #  (artifact + job summary) and never fails the build.
  # ═══════════════════════════════════════════════════════════════
  ai-evals:
    name: AI evals (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run AI eval harness (offline, no secrets)
        env:
          SKIP_ENV_VALIDATION: "1"
        run: npm run eval:ai

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-eval-report
          path: scripts/ai/eval/report.json
          if-no-files-found: warn
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 3: Test — Jest unit + integration + architectural guards
  #  Needs Postgres for integration tests.
  #
  #  Sharded across N matrix jobs via `jest --shard=K/N`. The default
  #  TOTAL_SHARDS = 4 turns a ~30-min single-process run into ~4×8-min
  #  parallel runs (each shard owns ~1/N of the suite). Each shard
  #  still runs serially inside its own process (`--runInBand`) to
  #  preserve the test-suite's "one DB per worker" invariant.
  #
  #  When `vars.LARGE_RUNNER` is set on Team / Enterprise plans, the
  #  shards land on the larger runner — combined with sharding,
  #  end-to-end Test time drops from ~30 min → ~3-5 min per PR.
  #
  #  Branch protection: the required check is the "Test" SUMMARY
  #  job below (see `test-summary`), not the matrix members. That
  #  way a future shard-count change doesn't require updating the
  #  required-check set.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: "Test (shard ${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    # Skip on the weekly scheduled run — that cron exists to refresh the
    # CodeQL + Trivy scans, not to re-run the whole suite (build + docker +
    # codeql still run on schedule; test/e2e/load-smoke/coverage do not).
    if: ${{ github.event_name != 'schedule' }}
    # 35-minute budget. Pre-shard, the unit + integration + guards
    # + contracts suite ran ~24-25m and bumped this to 35m for
    # variance headroom. Each shard now does ~1/N of the work, but
    # we keep the 35m cap as a safety net — the cluster of shards
    # finishes well under that.
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]

    env:
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      # GAP-03 — deterministic test key so the startup-encryption-check
      # integration test can simulate NODE_ENV=production with a real
      # key, AND so any future test that asserts prod-only encryption
      # paths works without per-test env mutation. The unit suite still
      # uses the dev fallback under NODE_ENV=test (jest.setup.js sets
      # SKIP_ENV_VALIDATION=1).
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-32-chars-or-more-deterministic-x

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Quality gate: migrations must exist ──
      - name: "Gate: Prisma migrations exist"
        run: |
          COUNT=$(find prisma/migrations -name "migration.sql" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Prisma migrations found in prisma/migrations/"
            exit 1
          fi
          echo "✓ Found $COUNT migration(s)"

      # ── Create roles required by RLS migrations ──
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      # ── Apply schema to test DB ──
      - name: Enable pgvector (PGDG)
        uses: ./.github/actions/enable-pgvector
      - name: Apply Prisma migrations
        run: ./node_modules/.bin/prisma migrate deploy

      # ── Jest: unit + integration tests (sharded) ──
      # Each matrix worker runs Jest's deterministic 1-of-N hash split.
      # `--shard=${{ matrix.shard }}/${{ matrix.total }}` keeps each
      # test file on exactly one shard, so per-DB-row test fixtures
      # never collide across shards. The intra-shard run stays
      # `--runInBand` for the "one DB per worker" invariant.
      - name: "Run tests: unit + integration (shard)"
        # The integration suite + generated Prisma client push a single
        # `--runInBand` process right up to the runner's default ~2 GB V8 heap
        # ceiling — it OOMs (exit 134) nondeterministically. Run jest through
        # node with the same 8192 heap flag the Typecheck + Coverage jobs use.
        run: node --max-old-space-size=8192 node_modules/jest/bin/jest.js --runInBand --no-coverage --shard=${{ matrix.shard }}/${{ matrix.total }}

      # ── Architectural guard + API contract gates ──
      # These suites are fast (~30s combined) and not sharded — they
      # are an EXPLICIT pass/fail signal in the CI log distinct from
      # the wider Jest run. Pinned to shard 1 so they execute exactly
      # once per CI run (no redundant work across shards).
      #
      # On legitimate contract changes:
      #   1. `npm run openapi:generate`         (rewrites public/openapi.json)
      #   2. `npx jest tests/contracts/ -u`     (updates per-schema snapshots)
      #   3. Commit both files together. Reviewer sees the diff
      #      against the previous contract and approves explicitly.
      - name: "Run tests: architectural guards"
        if: matrix.shard == 1
        run: node --max-old-space-size=8192 node_modules/jest/bin/jest.js tests/guards/ --runInBand --forceExit --no-coverage

      - name: "Gate: API contract tests"
        if: matrix.shard == 1
        run: node --max-old-space-size=8192 node_modules/jest/bin/jest.js tests/contracts/ --runInBand --forceExit --no-coverage --ci

  # ═══════════════════════════════════════════════════════════════
  #  Job 3b: Test (summary) — single required check for the matrix
  #
  #  GitHub branch-protection rules can target a stable check name;
  #  this job aggregates the matrix shards into one. A future
  #  shard-count change here keeps the required check name the same.
  # ═══════════════════════════════════════════════════════════════
  test-summary:
    name: Test
    needs: [test]
    runs-on: ubuntu-latest
    # Skip alongside the test matrix on schedule (else the shard-result check
    # below would read `skipped` and fail). Otherwise always run so a failed
    # shard is surfaced even when another job cancels.
    if: ${{ !cancelled() && github.event_name != 'schedule' }}
    steps:
      - name: Verify every shard succeeded
        # `needs.test.result` is the aggregated status across all
        # matrix variants — `success` only when every shard passed.
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::One or more Test shards failed (result=${{ needs.test.result }})"
            exit 1
          fi
          echo "All Test shards passed."

  # ═══════════════════════════════════════════════════════════════
  #  Job 4: Coverage — enforce minimum test coverage threshold
  #  Blocking gate: fails if coverage drops below 60%.
  #
  #  RUNS ON MAIN PUSH ONLY.
  #
  #  Rationale: the Test matrix above (sharded) is the per-PR pass/
  #  fail gate; Coverage runs the SAME Jest suite a second time with
  #  instrumentation, adding ~30 min of CPU to every PR for what is
  #  effectively a duplicate signal at the PR level (coverage drift
  #  comes from MERGED code). Catching it on main + nightly is
  #  enough — if a PR causes a regression, the FIRST main push will
  #  block.
  # ═══════════════════════════════════════════════════════════════
  coverage:
    name: "Coverage (≥60%)"
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    # Main-push only. Dropped from the weekly schedule (scanning-refresh runs
    # stay lean — build + docker/Trivy + codeql); coverage drift comes from
    # MERGED code, which the first main push after a merge already catches.
    if: github.event_name == 'push'
    # 35-minute budget. R30 (group nodes) cancelled at 25m16s on
    # #716 even with the prior 25-min ceiling — the coverage-
    # instrumented variant has grown slower as the suite size +
    # branch count climbed past ~7,800 tests. Bumping to 35 leaves
    # ~10 min of headroom over the actual 25-min run; revisit if
    # the gate ever runs >30 min.
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      # GAP-03 — see comment on the `test` job above. Same deterministic
      # value so the coverage run sees identical encryption setup.
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-32-chars-or-more-deterministic-x

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Create roles required by RLS migrations ──
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      - name: Enable pgvector (PGDG)
        uses: ./.github/actions/enable-pgvector
      - name: Apply Prisma migrations
        run: ./node_modules/.bin/prisma migrate deploy

      # ── Coverage gate: Jest enforces thresholds via --coverageThreshold ──
      # The threshold values live in `jest.thresholds.json` (single source
      # of truth, also referenced by `jest.config.js`). They are passed
      # via the `--coverageThreshold` CLI flag because jest 29.7.0's
      # `coverageThreshold` config (top-level OR per-project) is silently
      # NOT enforced when `projects:` is set — runs exit 0 even on
      # observed coverage of 9% against a 99% floor. The CLI flag IS
      # enforced (exit 1 + "coverage threshold ... not met" message).
      # Empirical evidence + alternative paths considered:
      # docs/implementation-notes/2026-04-27-gap-15-coverage-enforcement.md
      #
      # Current floors (recalibrated 2026-07-10 from CI's coverage artifact:
      # measured − 2%, capped at 70, never lowering an already-stricter floor):
      #   global   branches=63 functions=64 lines=70 statements=70
      #   usecases branches=67 functions=70 lines=77 statements=75
      #   policies branches=78 functions=88 lines=88 statements=85
      #   events   branches=72 functions=61 lines=78 statements=75
      #   lib      branches=70 functions=66 lines=71 statements=70
      # Measured global at recalibration: B65.5 F67.0 L80.3 S78.7.
      - name: "Gate: test coverage thresholds"
        # Coverage instrumentation inflates heap well past the runner's default
        # ~2 GB ceiling — the full suite in one `--runInBand` process OOMs
        # (exit 134) BEFORE thresholds are evaluated. Invoke jest through node
        # with the heap flag applied directly to that V8 instance, mirroring the
        # Typecheck job's `tsc` invocation (NODE_OPTIONS does not reliably reach
        # a spawned CLI binary).
        run: |
          node --max-old-space-size=8192 node_modules/jest/bin/jest.js \
            --coverage --forceExit --runInBand \
            --coverageThreshold "$(cat jest.thresholds.json)"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 5: Build — production build verification
  #  No DB needed. Verifies `next build` succeeds cleanly.
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Env validation is INTENTIONALLY skipped at build time.
      # `SKIP_ENV_VALIDATION: "1"` (workflow-level `env:` above)
      # makes `src/env.ts` skip its zod check — CI has only dummy
      # secrets, so a real validation would fail. This is deliberate,
      # not an oversight.
      #
      # The REAL env gate is RUNTIME, not build time:
      #   - `src/env.ts` validates on process start (when
      #     SKIP_ENV_VALIDATION is unset — i.e. in prod);
      #   - `src/instrumentation.ts` runs the GAP-03 fail-fast
      #     startup checks (encryption key, Redis auth, …).
      # A green Build job is therefore NOT an env-config pass —
      # runtime is. See docs/ci-cd-pipeline-integrity.md § Build /
      # env-validation discipline. The posture is locked by
      # tests/guards/ci-pipeline-integrity.test.ts.
      # Incremental-build cache: restore Next's webpack module cache so
      # `next build` reuses unchanged compilation across runs. SAFE —
      # the build still runs and produces correct output; only the
      # intermediate cache is reused. Per-commit key + lockfile
      # restore-key = the Next.js-recommended CI pattern.
      - name: Cache Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextcache-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextcache-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js (production)
        # --webpack: nonce strict-CSP chunks (see Dockerfile + impl note).
        run: npx next build --webpack
        env:
          NODE_ENV: production
          # next build sits near the runner's default ~2 GB heap ceiling and
          # OOMs nondeterministically; give the build process explicit headroom.
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-failure-logs
          path: .next/trace
          retention-days: 7
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 6: E2E — Playwright browser tests
  #  Needs: build (validates app compiles before expensive E2E)
  # ═══════════════════════════════════════════════════════════════
  e2e:
    name: E2E
    needs: [build, changes]
    # Skip on content-only changes (docs/messages/md) and on the weekly scan.
    # A skipped required check passes branch protection.
    if: ${{ github.event_name != 'schedule' && needs.changes.outputs.code == 'true' }}
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    # The Playwright suite runs SERIALLY (workers: 1, fullyParallel:
    # false — see playwright.config.ts). Both a multi-JOB shard matrix and
    # an intra-job `workers: 3` were tried and reverted: the shard matrix
    # duplicated the ~10-15min setup per shard, and workers>1 flaked the
    # heavier timing-sensitive specs (tenant creation, audit-pack share,
    # offline queue, a11y) under parallel load for only ~1min of gain.
    # `retries: 2` covers transient localhost races. The 40-min budget
    # gives headroom for the serial suite + retries.
    timeout-minutes: 40

    env:
      AUTH_TEST_MODE: "1"
      AUTH_TRUST_HOST: "1"
      AUTH_SECRET: "test-auth-secret-that-is-long-enough-32chars" # pragma: allowlist secret — test-only stub for the e2e CI job
      JWT_SECRET: "test-auth-secret-that-is-long-enough-32chars" # pragma: allowlist secret — test-only stub for the e2e CI job
      AUTH_URL: "http://localhost:3006"
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      # GAP-13: `next start` refuses to boot in prod without REDIS_URL.
      # The previous `RATE_LIMIT_ENABLED=0` escape hatch was removed
      # (Redis underpins login throttle, invite redemption, BullMQ jobs,
      # session coordination — not just rate limits) — see the docblock
      # in src/instrumentation.ts. The redis service below satisfies
      # the boot check; RATE_LIMIT_ENABLED stays "0" so 429s don't
      # interfere with the auth + UI flow under test.
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_ENABLED: "0"
      # GAP-03 startup sentinel — the encryption-key check refuses to boot
      # in prod mode without a >=32-char DATA_ENCRYPTION_KEY. Same synthetic
      # CI-only value other jobs in this workflow use (lines 128, 209) so
      # ciphertexts written by one job decrypt under another.
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-32-chars-or-more-deterministic-x

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7

      - name: Setup environment
        run: cp .env.e2e.example .env

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Create roles required by RLS migrations ──
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      - name: Enable pgvector (PGDG)
        uses: ./.github/actions/enable-pgvector
      - name: Apply Prisma migrations
        run: ./node_modules/.bin/prisma migrate deploy

      - name: Seed test database
        run: npx tsx prisma/seed.ts

      - name: Create upload directory
        run: mkdir -p /tmp/ci-uploads

      # Incremental-build cache (E2E test-mode build → `.next-test/`,
      # see next.config.js distDir). SAFE: build still runs; only the
      # webpack module cache is reused. Separate key from the plain
      # build job because NEXT_PUBLIC_TEST_MODE is inlined here.
      - name: Cache Next.js build cache (test-mode)
        uses: actions/cache@v6
        with:
          path: .next-test/cache
          key: nextcache-e2e-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextcache-e2e-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js app
        # --webpack: match the deployed bundler (nonce strict-CSP chunks).
        run: npx next build --webpack
        env:
          NODE_ENV: production
          NEXT_TEST_MODE: "1"
          NODE_OPTIONS: --max-old-space-size=8192
          # NEXT_PUBLIC_* env vars are inlined at BUILD time, so they
          # must be set on the build step (not just on `playwright test`)
          # to take effect in the runtime bundle. Mirrors what
          # `scripts/e2e-local.mjs` does. Suppresses the Driver.js
          # onboarding tour AND the sidebar calendar-badge polling —
          # both produce background network noise that keeps
          # `waitForLoadState('networkidle')` from settling within the
          # 180s test timeout on slow CI runners.
          NEXT_PUBLIC_TEST_MODE: "1"

      # ── Playwright with browser cache ──
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── GAP-20: accessibility gate ──
      # The a11y spec runs first as a NAMED step so its pass/fail
      # signal is visible at a glance in the CI annotation, separate
      # from the broader functional E2E suite. The spec itself
      # (`tests/e2e/a11y.spec.ts`) hard-fails on `serious` and
      # `critical` axe violations across login, dashboard, the four
      # main list pages, coverage, and the create-control modal.
      # `moderate` and `minor` findings are LOGGED for triage but
      # do not block — the policy is intentional, see the docblock
      # at the top of the spec.
      - name: "Gate: accessibility (axe) — GAP-20"
        run: npx playwright test tests/e2e/a11y.spec.ts
        env:
          CI: "true"

      - name: Run E2E tests
        # Skip the a11y spec here — already executed as the gate above.
        run: npx playwright test --grep-invert "a11y"
        env:
          CI: "true"

      # ── Artifacts (always on non-success) ──
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
        continue-on-error: true

      - name: Upload test results (traces, screenshots, videos)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 6.5: Load Smoke — k6 mutation smoke (10 VUs × 30s)
  #
  #  Runs on every PR + push to main. Catches obvious latency / error
  #  regressions in the highest-traffic mutation paths (control create,
  #  evidence upload) before merge. Full-scale baselines stay in the
  #  on-demand load-test.yml workflow (50 / 100 / 200 VU).
  #
  #  Thresholds (from tests/load/mutations.js, must stay in sync):
  #    p95 < 1500ms (create_control), 2000ms (upload_evidence)
  #    p99 < 3000ms / 4000ms
  #    error-rate < 2% per op, check-rate > 98%
  #
  #  Needs: build (no point smoking the app if it doesn't compile).
  # ═══════════════════════════════════════════════════════════════
  load-smoke:
    name: "Load Smoke (k6)"
    needs: [build, changes]
    # Main-push only (skips PRs entirely) and only when code changed — a k6
    # smoke check is redundant per-PR; the merge to main exercises it. Not on
    # schedule (scanning-refresh runs stay lean).
    if: ${{ github.event_name == 'push' && needs.changes.outputs.code == 'true' }}
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 12

    env:
      AUTH_TEST_MODE: "1"
      AUTH_TRUST_HOST: "1"
      AUTH_SECRET: "test-auth-secret-that-is-long-enough-32chars" # pragma: allowlist secret — test-only stub for the load-smoke CI job
      JWT_SECRET: "test-auth-secret-that-is-long-enough-32chars" # pragma: allowlist secret — test-only stub for the load-smoke CI job
      AUTH_URL: "http://localhost:3006"
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DIRECT_DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      # GAP-13: `next start` refuses to boot in prod mode without
      # REDIS_URL. The previous RATE_LIMIT_ENABLED=0 escape hatch was
      # removed (see src/instrumentation.ts) — Redis underpins more
      # than rate-limiting. The redis service container below
      # satisfies the boot check; RATE_LIMIT_ENABLED stays "0" so
      # 429 backpressure doesn't interfere with mutation-throughput
      # measurements.
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_ENABLED: "0"
      DATA_ENCRYPTION_KEY: ci-test-data-encryption-key-32-chars-or-more-deterministic-x

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v7

      - name: Setup environment
        run: cp .env.e2e.example .env

      - name: Setup Node + Prisma client
        uses: ./.github/actions/setup-node-prisma
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # ── Create roles required by RLS migrations ──
      - name: Create PostgreSQL roles for RLS
        run: |
          PGPASSWORD=ci_password psql -h localhost -U ci -d ci_testdb <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user NOLOGIN; END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN CREATE ROLE postgres NOLOGIN; END IF;
          END $$;
          GRANT app_user TO ci;
          GRANT app_user TO postgres;
          SQL

      - name: Enable pgvector (PGDG)
        uses: ./.github/actions/enable-pgvector
      - name: Apply Prisma migrations
        run: ./node_modules/.bin/prisma migrate deploy

      - name: Seed test database
        run: npx tsx prisma/seed.ts

      - name: Create upload + results directories
        # .env.e2e.example points UPLOAD_DIR / FILE_STORAGE_ROOT at
        # `./tmp/test-uploads` (matching the e2e job's convention).
        # tests/load/results/ is where mutations.js writes its summary
        # JSON in handleSummary(); without it k6 logs a "no such file"
        # error and the artifact upload step has nothing to collect.
        run: |
          mkdir -p tmp/test-uploads
          mkdir -p tests/load/results

      # Incremental-build cache (plain `.next/` build — no test mode).
      # SAFE: build still runs; only the webpack module cache is reused.
      - name: Cache Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextcache-loadsmoke-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextcache-loadsmoke-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js app
        # Do NOT set NEXT_TEST_MODE=1 here. next.config.js routes the
        # build to `.next-test/` when that env is set; this job runs
        # `next start` directly (no Playwright shim), so the build
        # must land in the default `.next/` directory the start
        # command reads from. The e2e job uses NEXT_TEST_MODE because
        # Playwright's runner expects the test-mode artifact path.
        # --webpack: match the deployed bundler (nonce strict-CSP chunks).
        run: npx next build --webpack
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Start app (background)
        run: |
          nohup npx next start -p 3006 > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3006/api/health > /dev/null 2>&1; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::App failed to start within 60s. Last 100 lines of log:"
          tail -n 100 /tmp/app.log || true
          exit 1

      # ── k6 smoke: 10 VUs × 30s mutation scenario ──
      # The script's own thresholds gate the run (p95/p99 latency,
      # error rate, check rate). A breach exits non-zero → CI fails.
      - name: "Gate: k6 mutation smoke"
        run: |
          k6 run \
            -e VUS=10 \
            -e DURATION=30s \
            -e RAMP_UP=5s \
            -e RAMP_DOWN=5s \
            -e RUN_ID=ci-${{ github.run_id }}-${{ github.run_attempt }} \
            tests/load/mutations.js

      - name: "Gate: k6 ag parcel-list smoke"
        run: k6 run -e VUS=10 -e DURATION=20s -e RAMP_UP=5s -e RAMP_DOWN=5s -e RUN_ID=ci-${{ github.run_id }}-parcel tests/load/ag-parcel-list.js

      - name: "Gate: k6 ag inventory-pagination smoke"
        run: k6 run -e VUS=10 -e DURATION=20s -e RAMP_UP=5s -e RAMP_DOWN=5s -e RUN_ID=ci-${{ github.run_id }}-inv tests/load/ag-inventory-pagination.js

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi

      - name: Upload k6 + app logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-smoke-results-${{ github.run_id }}
          path: |
            tests/load/results/*.json
            /tmp/app.log
          retention-days: 14
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 7: Security — supply chain and dependency checks
  #  npm audit is BLOCKING for high+ severity vulnerabilities.
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      # ── Dependency review (PR only) ──
      # Needs the GitHub dependency-graph API, which on a PRIVATE repo
      # requires GitHub Advanced Security. Without GHAS the action errors
      # ("Dependency review is not supported on this repository"), so gate it
      # on the same opt-in variable as CodeQL/Trivy — it SKIPS cleanly on a
      # private instance/fork and runs once GHAS is enabled
      # (CODE_SCANNING_ENABLED=true).
      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' && vars.CODE_SCANNING_ENABLED == 'true' }}
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        # CI hardening — retry npm ci so a flaky postinstall binary
        # download (e.g. onnxruntime-node ETIMEDOUT from an external
        # CDN) doesn't fail the job. npm ci wipes node_modules each run,
        # so retrying is clean.
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000
          for attempt in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "::warning::npm ci failed (attempt ${attempt}/3) — retrying"
            sleep 15
          done
          exit 1

      # ── Gate: lockfile integrity (deterministic, in-sync install) ──
      # `npm ci` already HARD-FAILS if package.json and
      # package-lock.json disagree (that is its contract vs `npm
      # install`), so a green install above is the first half of the
      # guarantee. This step closes the remaining gap: `npm ci` can
      # still silently NORMALISE the lockfile on disk (re-sort keys,
      # rewrite a drifted `resolved`/`integrity` field) without
      # erroring. `git diff --exit-code` fails the build if the
      # committed lockfile is not byte-identical to what a clean
      # install produces — i.e. the lockfile is stale and a
      # contributor forgot to commit the regenerated file. Combined
      # with the caret-free pins on the spatial-parse + map libs
      # (shpjs / @tmcw/togeojson / maplibre-gl) this makes the
      # dependency set reproducible build-over-build.
      - name: "Gate: lockfile integrity (deterministic install)"
        run: git diff --exit-code package-lock.json

      # ── Advisory: registry signature verification (supply-chain) ──
      # `npm audit signatures` verifies each installed package's
      # registry-published signature + attestation against the npm
      # public keys — surfacing a tampered tarball or compromised-
      # registry swap that the integrity-hash pin alone would not catch.
      # ADVISORY (continue-on-error), NOT a hard blocker: the npm
      # registry has not back-signed every legacy package *version*, so
      # an unsigned transitive dep is a normal state of the world, not
      # evidence of compromise — failing the build on it would be a
      # frequent false positive. The signature report still prints in
      # the CI log for review; the hard supply-chain blockers are the
      # lockfile-integrity gate above + the vulnerability `npm audit`
      # below + the Trivy container scan. Promote to blocking once the
      # dependency tree is confirmed fully signed.
      - name: "Advisory: npm registry signature verification"
        continue-on-error: true
        run: npm audit signatures

      # ── npm audit: BLOCKING on moderate+ severity (production deps) ──
      # `--omit=dev` scans only the runtime dependency tree, so a
      # MODERATE-or-higher finding here implies an exploitable
      # surface in shipped code. The bar was raised from HIGH+ to
      # MODERATE+ deliberately — moderate-severity CVEs in production
      # deps (postcss XSS, hono middleware bypass, otel/protobuf
      # decoding bugs) are the exact failure mode this gate exists
      # to prevent.
      #
      # Lowering this gate (back to `--audit-level=high` or
      # `=critical`) is a regression —
      # `tests/guardrails/security-gate-strictness.test.ts` fails CI
      # if the gate weakens. If a specific advisory genuinely cannot
      # be fixed today, add a tracked exemption with a written
      # rationale + upgrade plan rather than relaxing the global gate.
      - name: "Gate: npm audit (moderate+ blocks merge)"
        run: npm audit --omit=dev --audit-level=moderate

      # ── Full audit (informational — dev deps included) ──
      - name: "Info: npm audit (all deps)"
        run: npm audit --audit-level=critical 2>&1 || echo "::warning::npm audit found vulnerabilities in dev dependencies (see above)"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 8: CodeQL — SAST (Static Application Security Testing)
  #  Scans JavaScript/TypeScript for security vulnerabilities.
  #  Runs on every PR and push to main.
  # ═══════════════════════════════════════════════════════════════
  codeql:
    name: "CodeQL SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Code Scanning (SARIF upload → Security tab) requires GitHub Advanced
    # Security, which a PRIVATE instance/fork without GHAS does not have — the
    # analyze step then fails on upload. Gate the whole job on an explicit,
    # opt-in repo variable so it SKIPS cleanly on such instances instead of
    # running-and-erroring. On this repo (GHAS enabled), set the repo variable
    #   CODE_SCANNING_ENABLED=true
    # to keep CodeQL running. A skipped job reports its required check as
    # "skipped", which GitHub branch protection treats as passing.
    if: ${{ vars.CODE_SCANNING_ENABLED == 'true' }}

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # `.github/codeql/codeql-config.yml` pins the language list,
          # paths-ignore, and query suite. Removes the autodetection
          # mismatch that produced the configuration-error banner —
          # autodetection thought the repo needed `actions` +
          # `javascript` + `typescript` scans on top of
          # `javascript-typescript`; the config file makes the
          # workflow's scope explicit and matches what gets uploaded.
          config-file: ./.github/codeql/codeql-config.yml

      # CodeQL auto-builds JavaScript/TypeScript — no manual build needed.
      # The autobuild step handles source extraction.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ═══════════════════════════════════════════════════════════════
  #  Job 9: Docker — verify Dockerfile builds correctly
  #  Needs: build (no point testing Docker if app doesn't compile)
  # ═══════════════════════════════════════════════════════════════
  docker:
    name: "Docker Build & Scan"
    needs: [build, changes]
    # Runs on the weekly scan (Trivy SARIF refresh) OR whenever code changed.
    # A content-only PR (docs/messages/md) leaves the image unchanged, so skip
    # it — the last Trivy result stands and the cron refreshes it weekly.
    if: ${{ github.event_name == 'schedule' || needs.changes.outputs.code == 'true' }}
    runs-on: ${{ vars.LARGE_RUNNER || 'ubuntu-latest' }}
    # Roadmap-27 CI hardening — bumped 15 → 25. semantic-release
    # bumps the package.json version on every release, which
    # cache-misses the Docker `npm ci` layer; a cold full install
    # pushes this job past 15 min and the run is cancelled. GHA
    # layer caching is already enabled (cache-from/to: gha) — the
    # cold npm-ci layer after a version bump is unavoidable.
    #
    # This job now ALSO runs the Trivy image scan (folded in from the
    # former standalone `trivy` job) so the image is built ONCE and
    # scanned in place — no redundant rebuild. +5 min over the old
    # 25-min build budget covers the gating scan + SARIF upload.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      # Issue #1005 — reclaim runner disk space. ubuntu-latest ships
      # ~14 GB free; the multi-stage image build plus Trivy's
      # uncompressed-image copy to /tmp need more, and 2026-06-11
      # logged seven 'no space left on device' flakes across Docker
      # Build + Trivy on otherwise-green runs. Dropping the unused
      # preinstalled toolchains reclaims ~25-30 GB. Inline rm -rf of
      # documented runner-image paths only — deliberately NOT a
      # third-party action (supply-chain surface).
      - name: Free runner disk space (issue #1005)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: inflect-compliance:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export to local Docker daemon for Trivy scanning
          load: true

      # ── Trivy scan: BLOCKING on CRITICAL,HIGH ──
      # Runs in the SAME job as the build above — the image is already
      # loaded into the local daemon (`load: true`), so there is NO
      # second rebuild. This merge removed the former standalone `trivy`
      # job's ~7.5-min redundant image rebuild + its runner spin-up /
      # disk-cleanup / buildx-setup, and the inter-job scheduling gap.
      #
      # Container-image scan against OS packages + bundled libraries.
      # Dropping HIGH from the severity list (CRITICAL-only) is a
      # regression — `tests/guardrails/security-gate-strictness.test.ts`
      # fails CI if the gate weakens.
      #
      # `.trivyignore` carries narrow per-CVE exemptions with written
      # reasons + upgrade plans. Exemption entries are the structural
      # escape hatch; never weaken the global severity threshold.
      # (Currently: CVE-2026-33671 in the bundled npm CLI's picomatch,
      # not exploitable from app code; tracked for upgrade in the next
      # Node base-image bump.)
      - name: "Gate: Trivy vulnerability scan (critical+high)"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "inflect-compliance:ci-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivyignores: ".trivyignore"

      # ── SARIF upload for GitHub Security tab (informational) ──
      # Only meaningful where Code Scanning is available (GHAS). A private
      # instance/fork without it errors on the upload, so gate both the report
      # generation and the upload on the same opt-in variable the CodeQL job
      # uses — they skip cleanly there. `always()` is preserved so the SARIF
      # still uploads even when the blocking Trivy gate above flagged a vuln.
      - name: "Trivy SARIF report (all severities)"
        if: ${{ always() && vars.CODE_SCANNING_ENABLED == 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "inflect-compliance:ci-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ always() && vars.CODE_SCANNING_ENABLED == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container-scan"
        # `continue-on-error: true` removed (same reasoning as the
        # CodeQL job above): the upload now needs to either succeed
        # or fail the job loudly. Silent upload failures were
        # showing up as "Code scanning configuration error" banners
        # on the Security tab without breaking CI.
