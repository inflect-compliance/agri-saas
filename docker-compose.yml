services:
  postgres:
    # Agriculture SaaS: PostGIS-enabled image (superset of postgres:16)
    # for spatial parcel geometry. Drop-in for existing migrations.
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inflect_compliance
    # Postgres is only directly accessible on port 5434 (for migrations).
    # Application traffic goes through PgBouncer on port 5433.
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inflect_compliance"]
      interval: 3s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Connection to upstream Postgres ──
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inflect_compliance
      # ── Pool configuration ──
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      # ── Auth ──
      AUTH_TYPE: scram-sha-256
      # ── Monitoring ──
      STATS_PERIOD: "60"
      ADMIN_USERS: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Redis (caching, jobs, async coordination) ──
  # Dev Redis is intentionally UNAUTHENTICATED for local ergonomics,
  # and bound to 127.0.0.1 only — it is loopback-only, never reachable
  # from the dev machine's network. Production-like compose files
  # (docker-compose.prod.yml / .staging.yml / deploy/) require a
  # password via ${REDIS_PASSWORD:?…}.
  redis:
    image: redis:7-alpine
    # maxmemory-policy MUST be `noeviction` — Redis carries BullMQ job
    # state; an eviction policy (allkeys-lru/volatile-*) would silently
    # drop queued jobs under memory pressure. Matches prod + ElastiCache.
    # See docs/deployment.md "Redis — per-environment policy".
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── ClamAV (antivirus scanning) ──
  clamav:
    image: clamav/clamav:1.4
    ports:
      - '3310:3310'
    volumes:
      - clamav-defs:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # ClamAV needs ~2 min to download defs on first boot

  # ── Ollama (local AI provider — feat/ai-provider) ──
  # OpenAI-compatible model server for zero-cost local dev. After the
  # container is up, pull the clean-licensed default model once:
  #   docker compose exec ollama ollama pull qwen3:1.7b
  # The app's swappable AI provider defaults to this endpoint
  # (AI_BASE_URL=http://localhost:11434/v1, AI_MODEL=qwen3:1.7b). Prod
  # swaps to a hosted OpenAI-compatible backend by env alone — Ollama is
  # a dev-only service. The bearer key is ignored by Ollama (the SDK just
  # needs a non-empty string, hence AI_API_KEY=ollama).
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  clamav-defs:
  ollama:
