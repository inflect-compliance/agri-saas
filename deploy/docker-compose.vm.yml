#
# agrent — single-VM deploy (GCP / europe-west1-b).
# Caddy terminates TLS (Let's Encrypt via sslip.io) and reverse-proxies
# to the Next.js app. Postgres + PgBouncer + Redis are internal-only.
# No ClamAV (lean), local file storage. App + worker build from the
# repo Dockerfile in this directory.
#
# Interpolation + container env both come from ./.env (compose default
# env file). Build once as agrent-app:local; app + worker share it.
#

services:
  # ── Postgres (PostGIS + pgvector — spray-map geometry + RAG embeddings) ──
  db:
    build:
      context: ./deploy/postgres
    image: agrent-db:local
    container_name: agrent-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-inflect_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh:ro
    shm_size: '256m'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inflect} -d ${POSTGRES_DB:-inflect_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── PgBouncer (transaction pooler) ──
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: agrent-pgbouncer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-inflect}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-inflect_production}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      AUTH_TYPE: scram-sha-256
      STATS_PERIOD: "60"
      ADMIN_USERS: ${POSTGRES_USER:-inflect}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-inflect}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Redis (cache + BullMQ) ──
  redis:
    image: redis:7-alpine
    container_name: agrent-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD is required}" --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Next.js app ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MAPTILER_KEY: ${NEXT_PUBLIC_MAPTILER_KEY}
        NEXT_PUBLIC_MAP_BASEMAP_STYLE: ${NEXT_PUBLIC_MAP_BASEMAP_STYLE:-hybrid}
    # Auto-deploy: run the image Watchtower pulls from GHCR. The build:
    # block above is retained as a manual escape hatch — `docker compose
    # build app` still rebuilds locally under this same tag if GHCR is
    # unavailable.
    image: ghcr.io/inflect-compliance/agri-saas:latest
    container_name: agrent-app
    restart: always
    # Watchtower only touches containers carrying this label.
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-inflect_production}?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inflect_production}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STORAGE_PROVIDER: local
      AV_SCAN_MODE: disabled
      RATE_LIMIT_MODE: memory
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}"
    volumes:
      - uploads:/data/uploads
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal

  # ── BullMQ worker + scheduler (same image, overridden entrypoint) ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/inflect-compliance/agri-saas:latest
    container_name: agrent-worker
    restart: always
    labels:
      - com.centurylinklabs.watchtower.enable=true
    entrypoint: ["/bin/sh", "-c"]
    command: ["node dist/scheduler.mjs && node dist/worker.mjs"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-inflect_production}?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inflect_production}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      STORAGE_PROVIDER: local
      AV_SCAN_MODE: disabled
      RATE_LIMIT_MODE: memory
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}"
    volumes:
      - uploads:/data/uploads
    networks:
      - internal

  # ── Watchtower — auto-deploy from GHCR ──
  # Polls ghcr.io/inflect-compliance/agri-saas:latest every 5 min and, on a
  # new digest, pulls + recreates ONLY the labelled containers (app + worker).
  # GHCR pull creds come from the host docker config, mounted read-only. On
  # recreate the app entrypoint runs `prisma migrate deploy`, so schema
  # migrations self-apply. --cleanup removes the superseded image after update.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: agrent-watchtower
    restart: always
    # containrrr/watchtower defaults to Docker API client 1.25, which this
    # daemon (API 1.55) rejects (min 1.40). Pin a version in the daemon's
    # supported range.
    environment:
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command: --label-enable --cleanup --interval 300
    networks:
      - internal

  # ── Caddy (TLS + reverse proxy) ──
  caddy:
    image: caddy:2-alpine
    container_name: agrent-caddy
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    name: agrent-pgdata
  redisdata:
    name: agrent-redisdata
  uploads:
    name: agrent-uploads
  caddy-data:
    name: agrent-caddy-data
  caddy-config:
    name: agrent-caddy-config
